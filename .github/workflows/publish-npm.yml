name: Publish npm package

on:
  workflow_dispatch:
    inputs:
      package:
        description: "Package folder"
        required: true
        type: choice
        options:
          - sdks/ave-sdk
          - sdks/ave-embed
      version:
        description: "Package version to write and publish"
        required: true
        type: string
      access:
        description: "npm access"
        required: true
        default: "public"
        type: choice
        options:
          - public
          - restricted

permissions:
  contents: write
  id-token: write

concurrency:
  group: publish-npm-${{ inputs.package }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"

      - uses: oven-sh/setup-bun@v2

      - name: Update npm
        run: npm install -g npm@latest

      - name: Validate package and version
        run: |
          set -euo pipefail

          package_dir="${{ inputs.package }}"

          case "$package_dir" in
            sdks/ave-sdk|sdks/ave-embed) ;;
            *) echo "Unsupported package path: $package_dir" >&2; exit 1 ;;
          esac

          node <<'NODE'
          const fs = require("node:fs");
          const path = require("node:path");

          const packageDir = process.env.PACKAGE_DIR;
          const requestedVersion = process.env.REQUESTED_VERSION;
          const expectedRepositoryUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}`;
          const packageJsonPath = path.join(packageDir, "package.json");
          const manifest = JSON.parse(fs.readFileSync(packageJsonPath, "utf8"));
          const repositoryUrl = typeof manifest.repository === "string"
            ? manifest.repository
            : manifest.repository?.url;

          if (!manifest.name) throw new Error("package.json is missing name");
          if (manifest.private === true) throw new Error(`${manifest.name} is private`);
          if (repositoryUrl !== expectedRepositoryUrl) {
            throw new Error(`${manifest.name} repository.url is ${JSON.stringify(repositoryUrl ?? "")}, expected ${expectedRepositoryUrl}`);
          }
          if (!/^\d+\.\d+\.\d+(?:-[0-9A-Za-z.-]+)?(?:\+[0-9A-Za-z.-]+)?$/.test(requestedVersion)) {
            throw new Error(`Invalid semver version: ${requestedVersion}`);
          }

          fs.appendFileSync(process.env.GITHUB_ENV, `PACKAGE_NAME=${manifest.name}\n`);
          NODE
        env:
          PACKAGE_DIR: ${{ inputs.package }}
          REQUESTED_VERSION: ${{ inputs.version }}

      - name: Check publish branch
        run: |
          set -euo pipefail

          if [ "$GITHUB_REF_TYPE" != "branch" ]; then
            echo "Run this workflow from a branch so the version bump can be committed." >&2
            exit 1
          fi

      - name: Check npm version availability
        run: |
          set -euo pipefail

          if npm view "$PACKAGE_NAME@${{ inputs.version }}" version >/dev/null 2>&1; then
            echo "$PACKAGE_NAME@${{ inputs.version }} is already published" >&2
            exit 1
          fi

      - name: Bump package version
        run: |
          set -euo pipefail

          bun pm pkg set version="${{ inputs.version }}"

          node <<'NODE'
          const fs = require("node:fs");
          const path = require("node:path");

          const packageDir = process.cwd();
          const requestedVersion = process.env.REQUESTED_VERSION;
          const packageJsonPath = path.join(packageDir, "package.json");
          const lockPath = path.join(packageDir, "package-lock.json");
          const manifest = JSON.parse(fs.readFileSync(packageJsonPath, "utf8"));

          if (manifest.version !== requestedVersion) {
            throw new Error(`Version bump failed: package.json has ${manifest.version}, expected ${requestedVersion}`);
          }

          fs.writeFileSync(packageJsonPath, `${JSON.stringify(manifest, null, 2)}\n`);

          if (fs.existsSync(lockPath)) {
            const lock = JSON.parse(fs.readFileSync(lockPath, "utf8"));

            if (typeof lock.version === "string") {
              lock.version = requestedVersion;
            }
            if (lock.packages && lock.packages[""] && typeof lock.packages[""].version === "string") {
              lock.packages[""].version = requestedVersion;
            }

            fs.writeFileSync(lockPath, `${JSON.stringify(lock, null, 2)}\n`);
          }
          NODE
        working-directory: ${{ inputs.package }}
        env:
          REQUESTED_VERSION: ${{ inputs.version }}

      - name: Install dependencies
        run: bun install
        working-directory: ${{ inputs.package }}

      - name: Build package
        run: bun run build
        working-directory: ${{ inputs.package }}

      - name: Commit version bump
        run: |
          set -euo pipefail

          package_dir="${{ inputs.package }}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$package_dir/package.json"
          if [ -f "$package_dir/package-lock.json" ]; then
            git add "$package_dir/package-lock.json"
          fi

          if git diff --cached --quiet; then
            echo "No version changes to commit."
          else
            git commit -m "chore: release $PACKAGE_NAME@${{ inputs.version }}"
            git push origin "HEAD:$GITHUB_REF_NAME"
          fi

      - name: Publish package
        run: npm publish --access "${{ inputs.access }}"
        working-directory: ${{ inputs.package }}
