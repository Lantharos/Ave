<!doctype html>
<html lang="en" style="background:#090909;">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" type="image/png" href="/icon.png" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<meta name="theme-color" content="#090909" />
		<meta name="color-scheme" content="dark" />
		<meta name="referrer" content="no-referrer" />
		<meta name="description" content="Ave identity, developer, and business consoles." />
		<link rel="preconnect" href="https://api.aveid.net" crossorigin />
		<link rel="dns-prefetch" href="https://api.aveid.net" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
		<title>Ave</title>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover" style="margin:0;background:#090909;color:#ffffff;overscroll-behavior:none;">
		<div id="boot-bg" aria-hidden="true"></div>
		<div id="app">%sveltekit.body%</div>
		<script>
			function setVh() {
				const zoom = parseFloat(getComputedStyle(document.documentElement).zoom) || 1;
				const viewportWidth = window.innerWidth / zoom;
				const viewportHeight = window.innerHeight / zoom;
				const desktopScale = viewportWidth >= 900 && viewportWidth < 1600
					? viewportWidth / 1600
					: 1;
				const canvasWidth = viewportWidth / desktopScale;
				const canvasHeight = viewportHeight / desktopScale;
				const vh = viewportHeight * 0.01;

				document.documentElement.style.setProperty("--vh", `${vh}px`);
				document.documentElement.style.setProperty("--desktop-scale", `${desktopScale}`);
				document.documentElement.style.setProperty("--desktop-canvas-width", `${canvasWidth}px`);
				document.documentElement.style.setProperty("--desktop-canvas-height", `${canvasHeight}px`);
				document.documentElement.style.setProperty("--desktop-canvas-vh", `${canvasHeight * 0.01}px`);
			}

			if (document.readyState === "loading") {
				document.addEventListener("DOMContentLoaded", setVh);
			} else {
				setVh();
			}

			window.addEventListener("load", setVh);
			window.addEventListener("resize", setVh);
		</script>
	</body>
</html>
